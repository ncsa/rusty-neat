{% set name = "rneat" %}
{% set version = "1.16.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/ncsa/rusty-neat/archive/refs/tags/v{{ version }}.tar.gz
  # Update on each release:
  #   curl -sL https://github.com/ncsa/rusty-neat/archive/refs/tags/v{{ version }}.tar.gz | sha256sum
  sha256: c57e07c7531fc11267477fdd165a662eeb22a23dc40da75a5205c736273fedc8

build:
  number: 0
  # Rust binary; not supported on osx-arm64/aarch64 until tested there.
  skip: True  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - rust >=1.85          # edition 2024 requires a recent toolchain
    - cmake                # zlib-ng (flate2) build dependency
    - make

test:
  commands:
    - rneat --help
    - rneat gen-reads --help

about:
  home: https://github.com/ncsa/rusty-neat
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: "Rust toolkit for simulating NGS read data (FASTQ/VCF), including tumor/normal cancer sequencing"
  description: |
    rneat is a Rust port and extension of NEAT that generates simulated
    next-generation sequencing data in FASTQ and VCF formats matching the
    statistical properties of real datasets, plus a golden BAM/VCF truth set.
    It adds structural-variant simulation (CNV, BND, INV, INS) and an
    end-to-end tumor/normal cancer workflow (gen-cancer-reads) that emits an
    origin-tagged truth VCF for benchmarking somatic and SV callers.
  dev_url: https://github.com/ncsa/rusty-neat
  doc_url: https://github.com/ncsa/rusty-neat/blob/main/README.md

extra:
  recipe-maintainers:
    - joshfactorial
