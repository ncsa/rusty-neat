{% set name = "eidolon" %}
{% set version = "2.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/ncsa/eidolon/archive/refs/tags/v{{ version }}.tar.gz
  # Update on each release:
  #   curl -sL https://github.com/ncsa/eidolon/archive/refs/tags/v{{ version }}.tar.gz | sha256sum
  sha256: 288c80e1b9eafbd9579ad614d046a48e7a95e083539a499548078118e62b064a

build:
  number: 0
  # Rust binary; not supported on osx-arm64/aarch64 until tested there.
  skip: True  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}   # edition 2024 needs rust >=1.85 (CF default is newer)
    - cargo-bundle-licenses    # bundles 3rd-party Rust license texts into THIRDPARTY.yml
    - cmake                    # zlib-ng (flate2) build dependency
    - make

test:
  commands:
    - eidolon --help
    - eidolon gen-reads --help

about:
  home: https://github.com/ncsa/eidolon
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE.md         # eidolon's own BSD-3-Clause license
    - THIRDPARTY.yml     # generated by cargo-bundle-licenses in build.sh
  summary: "Rust toolkit for simulating NGS read data (FASTQ/VCF), including tumor/normal cancer sequencing"
  description: |
    eidolon is a Rust port and extension of NEAT that generates simulated
    next-generation sequencing data in FASTQ and VCF formats matching the
    statistical properties of real datasets, plus a golden BAM/VCF truth set.
    It adds structural-variant simulation (CNV, BND, INV, INS) and an
    end-to-end tumor/normal cancer workflow (gen-cancer-reads) that emits an
    origin-tagged truth VCF for benchmarking somatic and SV callers.
  dev_url: https://github.com/ncsa/eidolon
  doc_url: https://github.com/ncsa/eidolon/blob/main/README.md

extra:
  recipe-maintainers:
    - joshfactorial
