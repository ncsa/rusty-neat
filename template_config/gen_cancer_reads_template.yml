# Template configuration for `rneat gen-cancer-reads` — simulate a tumor/normal
# mixture in one command (two gen-reads passes over the same reference + merge).
#
#   rneat gen-cancer-reads -c cancer_template.yml
#
# Produces, in output_dir:
#   <prefix>_normal_r1.fastq.gz (+ _r2 if paired)   normal-pass reads
#   <prefix>_normal.vcf.gz                           germline truth
#   <prefix>_tumor_r1.fastq.gz  (+ _r2)              tumor-pass reads
#   <prefix>_tumor.vcf.gz                            germline + somatic truth
#   <prefix>_merged_r1.fastq.gz (+ _r2)              N_/T_-tagged, concatenated
#   <prefix>_merged_truth.vcf.gz                     INFO/NEAT_ORIGIN = germline | somatic | shared

# ── Required ──────────────────────────────────────────────────────────────
reference: /path/to/reference.fa          # .fa or .fa.gz
output_dir: /path/to/output
output_prefix: sample

# ── Coverage / purity ─────────────────────────────────────────────────────
total_coverage: 30      # combined coverage of the merged output
purity: 0.5             # tumor cell fraction, strictly in (0, 1):
                        #   tumor pass = purity * total, normal pass = the rest

# ── Reads ─────────────────────────────────────────────────────────────────
read_len: 151
paired_ended: true
fragment_mean: 350      # required when paired_ended
fragment_st_dev: 50     # required when paired_ended

# ── Models (optional) ─────────────────────────────────────────────────────
# normal_model: /path/to/germline_model.json.gz   # default: built-in germline model
# tumor_model: tools/cosmic_pancancer_sv_BRCA.json.gz   # per-tissue SV models available

# ── Somatic mutation rate (optional) ──────────────────────────────────────
# The tumor pass's de-novo mutations are SOMATIC. Default 1e-5 (typical solid
# tumor); set a float to override, or `model` to use the tumor model's fitted
# rate (corpus-aggregated models overstate per-tumor burden by ~50-500x).
# tumor_mutation_rate: 1e-5
# normal_mutation_rate: <float>           # default: normal model's fitted rate

# ── Structural variants (optional) ────────────────────────────────────────
sv_rate_scale: 0.0      # 0 = no de-novo SVs; 1.0 = the tumor model's nominal SV rate

# ── Misc (optional) ───────────────────────────────────────────────────────
# germline_vcf: /path/to/germline.vcf.gz  # supply a fixed germline instead of de-novo
# keep_per_pass: true                     # keep per-pass FASTQs (false = merged only)
# overwrite_output: false
rng_seed: cancer-simulate                 # per-pass seeds append -normal / -tumor
