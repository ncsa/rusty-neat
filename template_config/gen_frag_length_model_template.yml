# REQUIRED PARAMS
# Path to input BAM or SAM file [required]
# The file must contain paired-end aligned reads. BAM is recommended.
input_file:
# Path to the output model file [required] - should end in '.json.gz'
output_file:

# OPTIONAL PARAMS
# Minimum number of reads for a fragment length to be included in the model [optional]
# Default is 2 to handle smaller datasets. Set to 0 to disable filtering entirely.
# For larger datasets (e.g. whole-genome), try 100 and adjust from there.
min_reads: 2
# Overwrite existing output file [optional] - set to true to allow overwriting (default: false)
overwrite_output: false