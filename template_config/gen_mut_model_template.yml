# REQUIRED PARAMS
# path to reference file [required]
reference: 
# path to input vcf file [required]
vcf_file:
# Path to the output file [required] - should end in '.gz' as it will be a gzipped file
output_file: 

# OPTIONAL PARAMS
# Path to bed file [optional] - restrict model only to areas within the bed file
bed_file: .
# overwrite output [optional] - set to "true" to overwrite output of gen-mut-model (default: false)
overwrite_output: false
