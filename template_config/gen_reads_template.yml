# ============================================================
# gen-reads configuration template
# Usage: eidolon gen-reads -c /path/to/this/config.yml
#
# Set any field to . (a single dot) to use its default value.
# ============================================================

# --------------- required ---------------

# Full path to the reference genome in FASTA format (.fa or .fa.gz).
reference: /path/to/reference.fa

# --------------- read parameters ---------------

# Length of each simulated read in bases. (default: 151)
read_len: 151

# Target mean read depth across the reference. (default: 10)
coverage: 10

# --------------- mutation parameters ---------------

# Average per-base mutation rate applied when generating variants, overrides the model input.
# (default: is set by the mutation model and is ~0.0011 for the default model)
mutation_rate: .

# Number of chromosome copies in the simulated organism.
# Heterozygous variants are distributed across the copies. (default: 2)
ploidy: 2

# Minimum number of mutations to guarantee per contig, regardless of mutation_rate.
# Useful for short contigs where random sampling may produce zero variants. (default: 0)
minimum_mutations: 0

# To define custom mutation regions, create a bed file with the regions defined and add
# a column with the text "mut_rate=0.XXXX" where XXXX is the desired mutation rate for that
# region. All other regions will use the default mutation rate.
mutation_regions: .

# --------------- paired-end parameters ---------------

# Set to true to produce paired-end reads. (default: false)
# fragment_mean and fragment_st_dev are required when paired_ended is true.
paired_ended: false

# Mean fragment length for paired-end mode (float). Required when paired_ended: true.
fragment_mean: .

# Standard deviation of the fragment length distribution (float). Required when paired_ended: true.
fragment_st_dev: .

# --------------- output format ---------------

# Produce a FASTQ file (or pair of files for paired-end). (default: true)
# At least one of produce_fastq, produce_vcf, or produce_bam must be true.
produce_fastq: true

# Produce a gzipped VCF file recording all inserted variants. (default: false)
produce_vcf: false

# Produce a BAM file whose reads match the FASTQ exactly (same sequence, quality scores,
# variants, and sequencing errors applied). CIGAR strings reflect both genomic variants
# and sequencing error indels. The output is written in coordinate-sorted order, so
# `samtools index` is all that is needed before use with downstream tools. (default: false)
produce_bam: false

# --------------- output location ---------------

# Directory to write output files. Created if it does not exist. (default: current directory)
output_dir: .

# Stem name applied to all output files.
# e.g., "my_run" produces my_run_r1.fastq.gz, my_run.vcf.gz, my_run.bam (default: "neat_out")
output_filename: neat_out

# Set to true to overwrite existing output files. false will error on collision. (default: false)
overwrite_output: false

# --------------- reproducibility ---------------

# Seed string for the random number generator. Any whitespace-separated series of words.
# The seed used for a run is printed to the log; copy it here to reproduce that run exactly.
# Omit (or set to .) to use a timestamp-based seed. (default: auto timestamp)
rng_seed: .

# --------------- optional model files ---------------
# Each field accepts a path to a gzipped JSON model file produced by the corresponding
# eidolon sub-command. Omit (or set to .) to use the built-in NEAT2 default model.

# Custom quality score / sequencing error model (.json.gz).
# Generate with: eidolon gen-seq-error-model -c gen_seq_error_model_config.yml
sequence_error_model: .

# Custom SNP/indel mutation model (.json.gz).
# Generate with: eidolon gen-mut-model -c gen_mut_model_config.yml
mutation_model: .

# Custom fragment length model (.json.gz). Only used when paired_ended: true.
# Generate with: eidolon gen-frag-length-model -c gen_frag_length_model_config.yml
fragment_model: .

# --------------- targeted region filter ---------------

# Optional BED file (.bed or .bed.gz) of target regions.
# When provided, reads and variants are generated ONLY over regions in this file.
# Contigs absent from the BED are skipped entirely — no blocks are read, no temp
# files are written — making this the recommended approach for targeted-panel or
# exome runs on large genomes, where post-hoc filtering with `filter-reads` would
# otherwise process the entire genome first.
#
# Coordinates must use the same contig names as the reference FASTA.
# Omit (or set to .) to generate reads over the full reference. (default: none)
target_bed: .

# --------------- forced variants ---------------

# Optional VCF file (.vcf or .vcf.gz) of variants to force into the simulation.
# The VCF must be single-sample and every record must have a GT field in FORMAT.
# Accepted variant types: SNPs and indels (insertion / deletion).
# Complex variants (multi-base REF and multi-base ALT that are not a simple indel)
# are skipped with a warning — they are not yet supported.
# Contig names must match the short names in the reference FASTA.
#
# Positions not covered by the input VCF still receive randomly generated variants
# at mutation_rate. Set mutation_rate: 0 to disable random variants entirely.
# Omit (or set to .) to generate variants purely at random. (default: none)
input_vcf: .

# --------------- GC Bias --------------------------

# GC-Bias is the tendency for regions rich in GC to be undersampled during
# lab prep of the sample, which causes higher coverage in the remaining areas.
# To override the default GC Bias, you can input the path to a valid GC Bias model here.
gc_bias_model: .

# GC Bias comes with a slight limitation, which is that as eidolon simulates the coverage,
# it will generate reads, then throw out a percentage of them to simulate the GC Bias effect.
# This can cause overall undersampling within the sample. By default, NEAT will attempt to
# correct this undersampling. If you prefer to accept lower coverage, then set this to false
gc_bias_normalize_coverage: true

# --------------- long reads ---------------

# Set to true when simulating long-read platforms (PacBio HiFi, Oxford Nanopore).
# When true, fragments sampled from the fragment model that are shorter than read_len are
# kept rather than discarded, and the resulting read is truncated to the actual fragment
# length. This reproduces the realistic read-length distribution seen in real long-read
# datasets, where size selection is imperfect and a tail of shorter reads is always present.
#
# When false (the default, appropriate for Illumina short reads), fragments shorter than
# read_len are rejected. For Illumina, the correct physical behavior for short fragments
# is adapter read-through (full-length reads padded with adapter sequence), which is a
# separate concern outside the scope of this simulator; discarding them is the standard
# approach used by short-read simulators.
#
# long_reads requires paired_ended: true and a configured fragment_mean / fragment_model.
# (default: false)
long_reads: false

# --------------- structural variants (de novo) ---------------

# Scale applied to the mutation model's per-base structural-variant (SV) rate.
# 0.0 (the default) disables de novo SV generation entirely — only SVs supplied
# via input_vcf flow through. Values > 0 enable sampling from the model's
# sv_model (if present): 1.0 reproduces the trained corpus rate, larger values
# stress-test SV handling. Requires a mutation_model whose sv_model is populated.
# (default: 0.0)
sv_rate_scale: 0.0

# Maximum de novo SV length, expressed as a fraction of each contig's length.
# The sampler rejects drawn lengths above contig_len * sv_max_length_fraction to
# keep its overlap-rejection search tractable on chromosome-scale references.
# The default 0.25 (contig_len / 4) is correct for human chromosomes. Raise it
# toward 1.0 for small contigs (bacteria, viruses) — where 0.25 sits below the
# default DEL median and starves DEL/DUP/INV into BND — or to model native
# aneuploidy. Only affects de novo SVs, never input_vcf SVs. (default: 0.25)
sv_max_length_fraction: 0.25

# --------------- performance ---------------

# Maximum number of threads to use for parallel contig processing.
# Applies to all output modes including BAM — each contig writes to a private temp file
# and a final pass assembles them in coordinate order.
# Set to 1 to disable parallelism entirely. Omit (or set to .) to use all available cores.
# (default: auto)
num_threads: .

# Experimental, opt-in: target size (in base pairs) of a sub-contig chunk — the
# unit of parallel work. Splitting a contig lets several cores share one large
# chromosome. DISABLED BY DEFAULT: read generation is memory-bandwidth bound, so
# chunking did not improve wall time in our benchmarks. The size is independent
# of the thread count, so output is byte-identical regardless of num_threads.
#   omit / . / 0 -> disabled: one chunk per whole contig (default)
#   <integer>    -> opt in with a fixed chunk size in bp
# (default: disabled)
chunk_size: .