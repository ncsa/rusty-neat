# REQUIRED PARAMS
# path to input FASTQ file [required] - accepts .fastq or .fastq.gz
fastq_file:
# path to the output model file [required] - should end in '.json.gz' as it will be a gzipped file
output_file:

# OPTIONAL PARAMS
# overwrite output [optional] - set to "true" to overwrite an existing output file (default: false)
overwrite_output: false
# maximum number of reads to process [optional] - set to 0 for unlimited (default: 0)
max_reads: 0
# quality score ASCII offset [optional] - 33 for Illumina 1.8+/Sanger, 64 for older Illumina (default: 33)
qual_offset: 33
# binned quality bins [optional] - quantize the learned quality scores to a small bin set.
# When set, each observed Q-score is snapped to the nearest bin and gen-reads will emit only
# these values. Example presets: NovaSeq 6000 [2, 12, 23, 37], NextSeq 3-bin [2, 15, 35].
# Bins must be < 94 and cannot include 31 ('@' under Phred+33). Omit for a continuous model.
# binned_quality_bins: [2, 12, 23, 37]
# path to an aligned BAM file [optional] - used to infer the SNP transition matrix from
# read-vs-reference mismatches. The BAM must have MD tags (run 'samtools calmd' if absent).
# Ignored if transition_matrix_file is also set.
bam_file:
# path to a custom 4x4 SNP transition matrix TSV [optional] - rows and columns are A/C/G/T.
# A single header line is allowed and will be skipped. Diagonal values are ignored (set to 0).
# Takes precedence over bam_file. If neither is set, a default matrix is used.
# Example TSV format:
#   A    C    G    T
#   0.0  0.5  0.3  0.2
#   0.5  0.0  0.3  0.2
#   0.4  0.3  0.0  0.3
#   0.3  0.3  0.4  0.0
transition_matrix_file: